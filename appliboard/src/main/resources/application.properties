spring.application.name=appliboard

spring.datasource.url=jdbc:mysql://localhost:3306/AppliBoard?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}


spring.mongodb.uri=mongodb://localhost:27017/AppliBoard

jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000